<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>vaidyachain | Farm to Formula Blockchain Traceability</title>
    <meta name="description"
        content="vaidyachain ensures transparency, quality, and trust in the Ayurvedic supply chain using blockchain technology.">
    <link rel="stylesheet" href="styles.css">

    <!-- External Dependencies -->
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>

    <!-- Manifest & PWA -->
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#059669">
</head>

<body data-theme="light">
    <!-- Landing Page / Hero Section -->
    <section id="hero-section" class="hero">
        <div class="hero-content max-w-7xl m-auto">
            <span class="badge" data-i18n="tagline">Empowering Ayurveda with Trust</span>
            <h1 class="title" data-i18n="hero-title">vaidyachain Traceability</h1>
            <p class="subtitle" data-i18n="hero-subtitle">Digitalizing the Ayurvedic supply chain from farm to formula
                using immutable blockchain records and real-time lab testing.</p>
            <div class="flex items-center gap-4 justify-center">
                <button onclick="auth.loginWithGoogle()" class="btn btn-primary">
                    <i class="ph ph-google-logo"></i>
                    <span data-i18n="btn-get-started">Get Started (Farmer/Lab/Mfg)</span>
                </button>
                <button onclick="app.showDashboard('consumer')" class="btn btn-glass">
                    <i class="ph ph-magnifying-glass"></i>
                    <span data-i18n="btn-trace-batch">Trace a Batch</span>
                </button>
            </div>

            <div class="flex items-center gap-4 justify-center mt-8">
                <button onclick="i18n.setLanguage('en')" class="btn btn-glass btn-sm">EN</button>
                <button onclick="i18n.setLanguage('hi')" class="btn btn-glass btn-sm">हिन्दी</button>
                <button onclick="i18n.setLanguage('gu')" class="btn btn-glass btn-sm">ગુજરાતી</button>
            </div>
        </div>
    </section>

    <!-- Main App Shell (Dashboard) -->
    <div id="app-shell" class="app-shell flex">
        <!-- Sidebar Navigation -->
        <aside class="sidebar">
            <div class="brand flex items-center gap-2 mb-8 p-2">
                <div
                    style="background: var(--primary); width:32px; height:32px; border-radius:8px; display:flex; align-items:center; justify-content:center; color:white;">
                    <i class="ph ph-leaf"></i>
                </div>
                <h3 style="color:var(--primary); font-weight:700;">vaidyachain</h3>
            </div>

            <nav id="sidebar-nav" class="flex-col gap-2">
                <!-- Links will be dynamically populated based on Role-Based Access Control (RBAC) -->
            </nav>

            <div class="mt-auto p-2">
                <button onclick="auth.logout()" class="btn btn-glass w-full" style="justify-content:flex-start;">
                    <i class="ph ph-sign-out"></i>
                    <span data-i18n="btn-logout">Logout</span>
                </button>
            </div>
        </aside>

        <!-- Main Content Area -->
        <main class="main-content">
            <header class="flex items-center justify-between mb-8">
                <div>
                    <h2 id="view-title" class="title" style="font-size: 1.75rem; margin-bottom: 0;">Dashboard</h2>
                    <p id="view-subtitle" class="text-muted">Welcome back to vaidyachain environment.</p>
                </div>
                <div class="flex items-center gap-4">
                    <button onclick="app.toggleTheme()" class="btn btn-glass">
                        <i class="ph ph-moon"></i>
                    </button>
                    <div id="user-profile" class="flex items-center gap-2 card p-2" style="border-radius: 99px;">
                        <img id="user-avatar" src="https://api.dicebear.com/7.x/avataaars/svg?seed=Felix" alt="User"
                            style="width:32px; height:32px; border-radius:50%;">
                        <span id="user-name" style="font-weight:600; font-size: 0.875rem;">Loading...</span>
                    </div>
                </div>
            </header>

            <!-- Dynamic View Container -->
            <div id="view-container">
                <!-- Content injected by app.js router -->
                <div class="flex flex-col items-center justify-center p-20">
                    <span class="loader"></span>
                    <p class="mt-4 text-muted">Building your dashboard...</p>
                </div>
            </div>
        </main>
    </div>

    <!-- Notification Container -->
    <div id="toast-container" style="position:fixed; bottom:20px; right:20px; z-index:2000;"></div>

    <!-- Modals -->
    <div id="modal-overlay" class="modal-overlay"></div>

    <!-- Core App Logic -->
    <script type="module" src="app.js"></script>
</body>

</html>
