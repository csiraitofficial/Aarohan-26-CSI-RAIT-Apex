    <script>

        firebase.initializeApp(firebaseConfig);
        const dbInstance = firebase.firestore();
        
        async function run() {
            try {
                const batchId = "TEST-" + Date.now();
                await dbInstance.collection("collections").doc(batchId).set({
                    batchId: batchId,
                    farmerId: "test",
                    farmerName: "test",
                    herbType: "test",
                    quantity: 10,
                    price: 10,
                    totalValue: 100,
                    collectionDate: "2023-01-01",
                    location: {
                        latitude: 23.25,
                        longitude: 77.41,
                        address: 'Farm Location'
                    },
                    status: 'collected',
                    createdAt: firebase.firestore.FieldValue.serverTimestamp(),
                    timestamp: firebase.firestore.FieldValue.serverTimestamp()
                }, { merge: true });
                console.log("SUCCESS");
                document.body.innerHTML += "<h1>SUCCESS</h1>";
            } catch (e) {
                console.error("FAIL", e);
                document.body.innerHTML += "<h1>FAIL: " + e.message + "</h1>";
            }
        }
        run();
    </script>
